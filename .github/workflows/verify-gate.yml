# C-D22-4 (D6 19시 슬롯, 2026-05-01) — D-D21 권장 ③ 흡수.
#   i18n 키 회귀 가드 + 어휘 룰 + 콘트라스트 + 빌드/타입체크 통합 게이트.
#
# C-D23-4 (D6 23시 슬롯, 2026-05-01) — verify-d23 step 추가.
#   콘트라스트 게이트는 5베이스 hue 자동 검증 포함 (measure-contrast.mjs 내부).
#
# 트리거:
#   - main 브랜치 push (꼬미가 매 슬롯 직접 push 하므로 사후 검증).
#   - PR open/sync.
#   - 수동 dispatch.
#
# 정책:
#   - 의존성 0 추가 — npm ci + node 스크립트만 사용.
#   - 게이트 5종(i18n / vocab / contrast(+5 hue) / verify-d22 / verify-d23) + tsc + next build 통과 시 PASS.
#   - main 직접 push 모델이라 fail 시 수정은 다음 슬롯에서. 본 슬롯은 등록만.

name: verify-gate

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "eslint.config.mjs"
      - ".github/workflows/verify-gate.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install (npm ci)
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: i18n key 회귀 가드 (C-D21-1)
        run: node scripts/check-i18n-keys.mjs

      - name: 어휘 룰 (Confluence Do v30 #21)
        run: node scripts/check-vocab.mjs --all

      - name: 콘트라스트 (WCAG AA)
        run: node scripts/measure-contrast.mjs

      - name: D-D22 통합 검증
        run: node scripts/verify-d22.mjs

      - name: D-D23 통합 검증
        run: node scripts/verify-d23.mjs

      # C-D24-2 (D6 03시 슬롯, 2026-05-02) — F-53 5베이스 hue TS↔CSS single source 동기 검증.
      - name: 5 hue TS↔CSS 동기 (verify-hue-sync)
        run: node scripts/verify-hue-sync.mjs

      # C-D24-5 (D6 03시 슬롯, 2026-05-02) — D-D24 5건 통합 회귀 (38 assertion).
      - name: D-D24 통합 검증
        run: node scripts/verify-d24.mjs

      # C-D25-5 (D6 07시 슬롯, 2026-05-02) — B-59 Robusta 컨셉 사수 게이트 정식 도입.
      - name: 컨셉 사수 (Blend식 어휘 0 hits)
        run: node scripts/check-concept-copy.mjs

      # C-D25-5 (D6 07시 슬롯, 2026-05-02) — D-D25 5건 통합 회귀 (43 assertion).
      - name: D-D25 통합 검증
        run: node scripts/verify-d25.mjs

      # C-D26-5 (D6 11시 슬롯, 2026-05-02) — D-D26 5건 통합 회귀 + 168 kB HARD GATE.
      #   verify-d26 가 내부에서 next build 를 한 번 실행해 First Load JS 168 kB 검증.
      - name: D-D26 통합 검증 (한시 175 게이트, KQ_21 클로즈 후 168 정식 복귀)
        run: VERIFY_D26_SKIP_BUILD=1 node scripts/verify-d26.mjs

      # C-D27-5 (D6 15시 슬롯, 2026-05-02) — D-D27 5건 통합 회귀 + **168 kB 정식 HARD GATE**.
      #   한시 175 종료. catalog 5 namespace 분리 + dev-mode/PDF lazy 마운트로 메인 번들 −2 kB.
      #   verify-d27 자체가 next build 1회 실행 후 First Load JS 파싱 → 168 강제.
      - name: D-D27 통합 검증 (168 kB 정식 HARD GATE)
        run: node scripts/verify-d27.mjs

      # C-D28-자-1 (D6 19시 자율 슬롯, 2026-05-02) — catalog 분리 일관성 자동 검증.
      #   verify-d27 §1 의 workspace + header-cluster 2개 가드를 src 전체로 자동 확장.
      #   Spec 005~011 신규 모듈 추가 시 catalog 의존이 메인 번들로 새는 회귀 0 보장.
      #   C-D28-2 (D6 23시 슬롯, 2026-05-02) 강화: EXCLUDED_DIRS + LAZY 화이트리스트 누락 메시지.
      - name: catalog 분리 일관성 (메인 번들 catalog 의존 0)
        run: node scripts/check-catalog-isolation.mjs

      # C-D28-1~5 (D6 23시 슬롯, 2026-05-02) — D-D28 5건 통합 회귀 (18 assertion).
      #   db.ts v8 schedules+autoMarks / schedule-runner / auto-mark-sample-store / pickScenario.
      #   168 HARD GATE 는 verify-d27 가 담당 — 본 게이트는 build skip 으로 cache 재사용.
      - name: D-D28 통합 검증
        run: node scripts/verify-d28.mjs

      # 별도 next build step — verify-d22 호환 게이트 (`npm run build` 문자열 회귀 가드).
      #   verify-d27 가 이미 build 했으므로 .next 캐시 재사용 — 시간 ↓.
      - name: Next build (1st Load JS 게이트 시각 회귀)
        run: npm run build
